  <main>
    <section class="recipe-form-container">
      <header class="form-header">
        <h1>Create Your Recipe</h1>
        <p>Share your culinary magic by filling in the details below!</p>
      </header>

      <form action="php/createrecipe.php" method="POST" enctype="multipart/form-data">
        <!-- Recipe Name -->
        <div class="form-group">
          <label for="title">Recipe Name:</label>
          <input type="text" id="title" name="title" placeholder="What do you call your recipe?" required>
        </div>
         <!-- Serving Size -->
         <div class="form-group">
            <label for="serving">Serving Size:</label>
            <input type="number" id="serving" name="serving" placeholder="Number of servings" min="1" required>
            <span class="tooltip">How many people does this recipe serve?</span>
          </div>
    
          <!-- Cook Time -->
          <div class="form-group">
            <label for="cook_time">Cook Time (in minutes):</label>
            <input type="number" id="cook_time" name="cook_time" placeholder="e.g., 30" min="1" required>
            <span class="tooltip">Time required to cook this recipe.</span>
          </div>

        <!-- Ingredients -->
        <div class="form-group">
          <label for="ingredients">Ingredients:</label>
          <textarea id="ingredients" name="ingredients" placeholder="List your ingredients." rows="5" required></textarea>
        </div>

        <!-- Procedure -->
        <div class="form-group">
          <label for="prosedur">Procedure:</label>
          <textarea id="prosedur" name="prosedur" placeholder="How do you cook your recipe?" rows="7" required></textarea>
        </div>

        <!-- Category -->
        <div class="form-group">
            <label for="category">Category:</label>
            <select id="category" name="category" required>
              <option value="" disabled selected>Select a category</option>
              <option value="Breakfast">🍳 Breakfast</option>
              <option value="Lunch">🥪 Lunch</option>
              <option value="Dinner">🍝 Dinner</option>
            </select>
          </div>

        <!-- Recipe Photo -->
        <div class="form-group">
          <label for="recipe_photo">Upload a photo:</label>
          <input type="file" id="recipe_photo" name="recipe_photo" accept="image/*" required>
          <img id="photo-preview" class="recipe-photo-preview" alt="Recipe Preview">
        </div>

        <!-- Submit Button -->
        <button type="submit" class="submit-button">Save Recipe</button>
      </form>
    </section>

  <script>
    // Preview uploaded photo
    const recipePhotoInput = document.getElementById('recipe_photo');
    const photoPreview = document.getElementById('photo-preview');

    recipePhotoInput.addEventListener('change', () => {
      const file = recipePhotoInput.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (e) => {
          photoPreview.src = e.target.result;
          photoPreview.style.display = 'block';
        };
        reader.readAsDataURL(file);
      }
    });
  </script>
