<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #fbe5eb;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            min-height: 100vh;
        }

        .container {
            display: flex;
            max-width: 1100px;
            width: 90%;
            background-color: #fff;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        .form-section {
            flex: 1;
            padding: 40px;
            background-color: #fdf7f2;
        }

        .form-section img {
            
            width: 100px;
            margin-bottom: 20px;
        }
        .logo {
    display: block;
    margin-left: auto;
    margin-right: auto;
    /* Adjust the width as needed */
}


        .form-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .form-section input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }

        .form-section button {
            width: 100%;
            padding: 12px;
            background-color: #ff6384;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .form-section button:hover {
            background-color: #ff6384;
        }

        .image-section {
            flex: 1;
            background: url('images/porridge.jpg') no-repeat center center/cover;
        }

        .form-section .login-link {
            margin-top: 10px;
            text-align: center;
        }

        .form-section .login-link a {
            color: #FF6F3C;
            text-decoration: none;
        }

        .form-section .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Form Section -->
        <div class="form-section">
            <h1>WELCOME TO LITTLE LOVE RECIPE</h1>
            <img src="images/LittleLoveRecipe_Logo.png" alt="Logo" class="logo">
            <h2>Login</h2>
            <form action="login.php" method="post">
                <input type="text" name="name" placeholder="Username" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>


            <div class="signup">
                <p>Don't have an account? <a href="signup.html">Sign up</a></p>
            </div>
        </div>

        <!-- Image Section -->
        <div class="image-section"></div>
    </div>
</body>
</html>
